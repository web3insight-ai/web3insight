name: Build docker images and push
on:
  push:
    branches:
      - 'main'
    tags:
      - "*"
    paths-ignore:
      - '**.md'
      - '*.yml'
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push latest images
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.event.repository.full_name }}:latest

      - name: Deploy to server when tagged
        uses: appleboy/ssh-action@master
        # if: startsWith(github.ref, 'refs/tags/')
        with:
          host: ${{ secrets.WEBSITE_IP }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd ~/website/
            docker login ghcr.io -u ${{ github.repository_owner }} -p ${{ secrets.GITHUB_TOKEN }}
            docker-compose pull && docker-compose up -d --remove-orphans && docker system prune -af