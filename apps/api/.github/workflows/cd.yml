name: Build docker images and push
on:
  push:
    branches:
      - '*'
    tags:
      - "*"
    paths-ignore:
      - '**.md'
      - '*.yml'
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push prod images
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.event.repository.full_name }}:prod

      - name: Build and push dev images
        if: github.ref == 'refs/heads/dev'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.event.repository.full_name }}:dev

      - name: Deploy master branch(prod) to server when master branch
        uses: appleboy/ssh-action@master
        # Deploy only on master branch
        if: github.ref == 'refs/heads/master'
        with:
          host: ${{ secrets.WEBSITE_IP }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd ~/api/
            docker login ghcr.io -u ${{ github.repository_owner }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ghcr.io/${{ github.event.repository.full_name }}:prod && docker-compose up -d --remove-orphans && docker system prune -af

      - name: Deploy dev branch(dev) to server when dev branch
        uses: appleboy/ssh-action@master
        # Deploy only on dev branch
        if: github.ref == 'refs/heads/dev'
        with:
          host: ${{ secrets.WEBSITE_IP }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd ~/api/
            docker login ghcr.io -u ${{ github.repository_owner }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ghcr.io/${{ github.event.repository.full_name }}:dev && docker-compose up -d --remove-orphans && docker system prune -af