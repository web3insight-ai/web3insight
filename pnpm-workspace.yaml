packages:
  - 'config/*'
  - 'packages/*'
  - 'apps/*'

catalog:
  # Core language tooling
  typescript: 6.0.3
  '@types/node': 25.8.0
  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3
  tsx: 4.23.1

  # Validation / contracts
  zod: 4.4.3
  '@hookform/resolvers': 5.2.2
  react-hook-form: 7.76.0

  # oRPC (api-contract + clients + server adapters)
  '@orpc/contract': 1.14.8
  '@orpc/server': 1.14.8
  '@orpc/client': 1.14.8
  '@orpc/zod': 1.14.8
  '@orpc/tanstack-query': 1.14.8
  '@orpc/openapi': 1.14.8

  # Frontend runtime
  next: 16.2.10
  react: 19.2.7
  react-dom: 19.2.7
  '@tanstack/react-query': 5.101.2
  '@tanstack/react-query-devtools': 5.101.2

  # UI
  tailwindcss: 4.3.2
  '@tailwindcss/postcss': 4.3.2
  'tailwind-merge': 3.6.0
  clsx: 2.1.1
  'class-variance-authority': 0.7.1
  'lucide-react': 1.16.0
  'framer-motion': 12.38.0
  recharts: 3.8.1

