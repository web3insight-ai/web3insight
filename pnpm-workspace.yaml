  '@scalar/hono-api-reference': 0.11.11
  '@t3-oss/env-core': 0.13.11
  jose: 6.2.3
  inngest: 4.4.0

  # Data layer
  'drizzle-orm': 0.45.2
  'drizzle-kit': 0.31.10
  pg: 8.22.0
  '@octokit/rest': 22.0.1

  # Logging
  pino: 10.3.1
  'pino-pretty': 13.1.3

  # Dev tooling
  eslint: 9.39.5
  prettier: 3.9.6
  vitest: 4.1.10
  '@vitest/coverage-v8': 4.1.10

  # Husky / git
  husky: 9.1.7
  'lint-staged': 17.1.0
  syncpack: 15.3.2
  turbo: 2.10.5

  # Misc utilities used in multiple apps
  'date-fns': 4.4.0
  'embla-carousel-react': 8.6.0
  'react-markdown': 10.1.0
  sonner: 2.0.7
