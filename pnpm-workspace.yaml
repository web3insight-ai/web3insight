packages:
  - 'config/*'
  - 'packages/*'
  - 'apps/*'

catalog:
  # Core language tooling
  typescript: 'catalog:'
  '@types/node': 'catalog:'
  '@types/react': 'catalog:'
  '@types/react-dom': 'catalog:'
  tsx: 'catalog:'

  # Validation / contracts
  zod: 'catalog:'
  '@hookform/resolvers': 'catalog:'
  react-hook-form: 'catalog:'

  # oRPC (api-contract + clients + server adapters)
  '@orpc/contract': 'catalog:'
  '@orpc/server': 'catalog:'
  '@orpc/client': 'catalog:'
  '@orpc/zod': 'catalog:'
  '@orpc/tanstack-query': 'catalog:'
  '@orpc/openapi': 'catalog:'

  # Frontend runtime
  next: 'catalog:'
  react: 'catalog:'
  react-dom: 'catalog:'
  '@tanstack/react-query': 'catalog:'
  '@tanstack/react-query-devtools': 5.100.10

  # UI
  tailwindcss: 'catalog:'
  '@tailwindcss/postcss': 'catalog:'
  'tailwind-merge': 3.6.0
  clsx: 2.1.1
  'class-variance-authority': 0.7.1
  'lucide-react': 'catalog:'
  'framer-motion': 'catalog:'
  recharts: 'catalog:'

  # Auth
  '@privy-io/react-auth': 'catalog:'

  # AI
  ai: 'catalog:'
  '@ai-sdk/openai': 'catalog:'
  '@ai-sdk/azure': 'catalog:'
  '@ai-sdk/react': 'catalog:'

  # Backend (Hono on Vercel — replacing NestJS)
  hono: 4.12.19
  '@hono/zod-validator': 0.8.0
  '@scalar/hono-api-reference': 0.10.16
  '@t3-oss/env-core': 0.13.11
  jose: 6.2.3
  inngest: 4.4.0

  # Legacy NestJS (still installed for unmigrated apps/api during Hono rewrite —
  # remove once Phase B deletes the NestJS scaffold)
  '@nestjs/common': 'catalog:'
  '@nestjs/core': 'catalog:'
  '@nestjs/platform-express': 'catalog:'
  '@nestjs/config': 'catalog:'
  '@nestjs/swagger': 'catalog:'
  '@nestjs/jwt': 'catalog:'
  '@nestjs/event-emitter': 'catalog:'
  '@nestjs/schedule': 'catalog:'
  'nestjs-console': 10.0.0

  # Data layer
  kysely: 'catalog:'
  pg: 'catalog:'
  'pg-cursor': 2.19.0
  '@octokit/rest': 22.0.1

  # Logging
  pino: 10.3.1
  'pino-pretty': 13.1.3

  # Dev tooling
  eslint: 'catalog:'
  prettier: 3.8.3
  vitest: 'catalog:'
  '@vitest/coverage-v8': 4.1.6

  # Husky / git
  husky: 'catalog:'
  'lint-staged': 'catalog:'
  syncpack: 'catalog:'
  turbo: 'catalog:'

  # Misc utilities used in multiple apps
  'date-fns': 'catalog:'
  'embla-carousel-react': 'catalog:'
  'react-markdown': 'catalog:'
  sonner: 'catalog:'
