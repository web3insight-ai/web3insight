name: Release

permissions:
  contents: write

on:
  push:
    tags:
      # Match monorepo-wide release tags only; indexer publishes binaries
      # via .github/workflows/indexer-build.yml on `indexer-v*` tags.
      - 'v*'
      - '!indexer-v*'

jobs:
  release:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          registry-url: https://registry.npmjs.org/
          node-version: lts/*

      - name: Generate release notes
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
